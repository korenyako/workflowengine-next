map_hash_bucket_size 128;

map $uri $new_uri {
    default                                    "";
    "/documentation/getting-started/"          "https://formengine.io/documentation/formengine-designer/getting-started/";
    "/documentation/overview/"                 "https://formengine.io/documentation/formengine-designer/getting-started/overview/";
    "/documentation/installation/"             "https://formengine.io/documentation/formengine-designer/getting-started/installation/";
    "/documentation/usage/"                    "https://formengine.io/documentation/formengine-designer/getting-started/usage/";
    "/documentation/custom-components/"        "https://formengine.io/documentation/formengine-designer/features/custom-components/";

    "/documentation/nested-components/"        "https://formengine.io/documentation/formengine-designer/features/nested-components/";
    "/documentation/presets-components/"       "https://formengine.io/documentation/formengine-designer/features/presets-components/";
    "/documentation/component-styling/"        "https://formengine.io/documentation/formengine-designer/features/component-styling/";
    "/documentation/modal-components/"         "https://formengine.io/documentation/formengine-designer/features/modal-components/";
    "/documentation/adaptive-layout/"          "https://formengine.io/documentation/formengine-designer/features/adaptive-layout/";
    "/documentation/disabled-and-read-only/"   "https://formengine.io/documentation/formengine-designer/features/disabled-and-read-only/";
    "/documentation/validation/"               "https://formengine.io/documentation/formengine-designer/features/validation/";
    "/documentation/computed-properties/"      "https://formengine.io/documentation/formengine-designer/features/computed-properties/";
    "/documentation/user-defined-properties/"  "https://formengine.io/documentation/formengine-designer/features/user-defined-properties/";
    "/documentation/localization/"             "https://formengine.io/documentation/formengine-designer/features/localization/";
    "/documentation/actions/"                  "https://formengine.io/documentation/formengine-designer/features/actions/";
    "/documentation/conditional-rendering/"    "https://formengine.io/documentation/formengine-designer/features/conditional-rendering/";
    "/documentation/using-tabs/"               "https://formengine.io/documentation/formengine-designer/features/using-tabs/";
    "/documentation/forms-json/"               "https://formengine.io/documentation/formengine-designer/features/forms-json/";
    "/documentation/form-storage/"             "https://formengine.io/documentation/formengine-designer/features/form-storage/";
    "/documentation/designer-customization/"   "https://formengine.io/documentation/formengine-designer/features/designer-customization/";
    "/documentation/designer-localization/"    "https://formengine.io/documentation/formengine-designer/features/designer-localization/";

    "/documentation/components-library/fields-components/google-map/"        "https://formengine.io/documentation/formengine-designer/components/google-map/";
    "/documentation/components-library/fields-components/rich-text-editor/"  "https://formengine.io/documentation/formengine-designer/components/rich-text-editor/";
    "/documentation/components-library/fields-components/signature/"         "https://formengine.io/documentation/formengine-designer/components/signature/";
    "/documentation/components-library/static-components/qr-code/"           "https://formengine.io/documentation/formengine-designer/components/qr-code/";
    "/documentation/components-library/structure-components/table/"          "https://formengine.io/documentation/formengine-designer/components/table/";

    "/documentation/external-api-access/"                               "https://formengine.io/documentation/formengine-designer/faq/external-api-access/";
    "/documentation/getting-form-json/"                                 "https://formengine.io/documentation/formengine-designer/faq/getting-form-json/";
    "/documentation/storing-user-defined-data/"                         "https://formengine.io/documentation/formengine-designer/faq/storing-user-defined-data/";
    "/documentation/theme-manipulation/"                                "https://formengine.io/documentation/formengine-designer/faq/theme-manipulation/";
    "/documentation/using-designer-and-rsuite-components-in-react-19/"  "https://formengine.io/documentation/formengine-designer/faq/using-designer-and-rsuite-components-in-react-19/";
    "/documentation/license-key/"                                       "https://formengine.io/documentation/formengine-designer/license-key/";
}

server {
    listen 8093;

    root /usr/share/nginx/html;
    error_page 401 /401.html;
    error_page 404 /404.html;
    rewrite ^([^.]*[^/])$ $1/ permanent;
    absolute_redirect off;

    add_header Content-Security-Policy "frame-ancestors 'self';";

    if ($new_uri) {
        return 301 $new_uri;
    }

    location / {
        try_files $uri $uri/index.html =404;
    }

    location ~ ^/documentation/documentation/ {
        return 404;
    }

    location /documentation {
        try_files $uri/index.html $uri/ =404;
    }

    location /documentation/getting-form-data/ {
        return 301 https://formengine.io/documentation/form-data/;
    }

    location /pricing {
        return 301 https://formengine.io/react-form-builder-library/pricing;
    }

    location ~ \.(jpg|jpeg|gif|png|ico|bmp|cur|svg|zip|tgz|gz|rar|bz2|doc|xls|pdf|ppt|txt|rtf|tar|wav|mp3|ogg|avi|mov|mp4|ogv|webm|htc|flv|swf|js|css) {
        access_log off;
        expires modified +1y;
        add_header Cache-Control public;
        etag on;
        try_files $uri =404;
    }

    location /backend/ {
        include fastcgi_params;
        fastcgi_pass formengine-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
