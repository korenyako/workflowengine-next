name: Update stargazers
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

env:
  TARGET_REPO: optimajet/formengine

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1) Sync to tip of remote main
      - name: Sync to latest remote main
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"

      - name: Show target
        run: echo "Will fetch stargazers from $TARGET_REPO"

      # 2) Generate from current HEAD - no conflicts
      - name: Fetch stargazers
        run: node scripts/fetch-stargazers.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ env.TARGET_REPO }}

      # 3) Commit and push; one safe retry on race
      - name: Commit & push
        run: |
          set -e
          if ! git diff --quiet -- public/stargazers.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/stargazers.json
            git commit -m "chore(ci): update stargazers.json"
            BRANCH="${GITHUB_REF_NAME:-main}"
            git push origin HEAD:"$BRANCH" || {
              echo "Push raced, pulling & retrying once…"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
              # regenerate on fresh state and push
              TARGET_REPO="${{ env.TARGET_REPO }}" node scripts/fetch-stargazers.mjs
              git add public/stargazers.json
              git commit -m "chore(ci): update stargazers.json (retry)"
              git push origin HEAD:"$BRANCH"
            }
          else
            echo "No changes to commit"
          fi
